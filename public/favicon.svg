<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E9E8A"/>
      <stop offset="100%" stop-color="#075E52"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Subtle top shine -->
  <rect width="32" height="16" rx="7" fill="url(#shine)"/>

  <!-- Medical cross — vertical bar -->
  <rect x="13.5" y="6.5" width="5" height="19" rx="2" fill="white" opacity="0.96"/>

  <!-- Medical cross — horizontal bar -->
  <rect x="6.5" y="13.5" width="19" height="5" rx="2" fill="white" opacity="0.96"/>
</svg>
